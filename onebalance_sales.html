<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
:root{--red:#DB444C;--red-light:#fdecea;--red-dark:#b8383f;--blue:#5BB9CD;--blue-light:#e3f5fb;--bg:#f5f5f7;--card:#fff;--text:#1a1a1a;--text2:#666;--text3:#aaa;--border:#e8e8e8;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);}
html,body{touch-action:pan-x pan-y;overscroll-behavior:none;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:calc(80px + var(--safe-bottom));}
.page{display:none;}.page.active{display:block;}
.header{background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);padding:calc(52px + var(--safe-top)) 16px 28px;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;}
.header-title{color:#fff;font-size:18px;font-weight:900;letter-spacing:0.08em;}
.header-sub{color:rgba(255,255,255,0.75);font-size:11px;margin-top:2px;font-weight:500;}
.header-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.refresh-btn{background:rgba(255,255,255,0.2);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
.refresh-btn i{color:#fff;font-size:16px;}
.refresh-btn.spinning i{animation:spin 0.8s linear infinite;}
.period-bar{display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(255,255,255,0.15);border-radius:24px;padding:6px;}
.period-btn{background:rgba(255,255,255,0.15);border:none;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.period-btn:active{background:rgba(255,255,255,0.3);}
.period-btn i{color:#fff;font-size:16px;}
.period-label{color:#fff;font-size:14px;font-weight:900;flex:1;text-align:center;letter-spacing:0.04em;}
.period-label .ym-year{font-size:12px;opacity:0.85;margin-right:4px;font-weight:700;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px;margin-top:-16px;}
.kpi-card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.kpi-label{font-size:10px;color:var(--text2);font-weight:500;margin-bottom:4px;letter-spacing:0.04em;}
.kpi-value{font-size:18px;font-weight:900;color:var(--text);line-height:1.2;word-break:break-all;}
.kpi-diff{font-size:10px;margin-top:5px;font-weight:700;}
.kpi-diff.up{color:var(--red);}.kpi-diff.down{color:var(--blue);}.kpi-diff.neutral{color:var(--text3);}
.kpi-card.profit .kpi-value{color:var(--red);}
.section{padding:20px 14px 0;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.section-title{font-size:14px;font-weight:700;color:var(--text);}
.toggle-wrap{display:flex;background:#f0f0f0;border-radius:8px;padding:2px;}
.toggle-btn{font-size:10px;padding:5px 11px;border-radius:6px;font-weight:700;color:var(--text2);cursor:pointer;border:none;background:transparent;transition:all 0.2s;}
.toggle-btn.active{background:var(--red);color:#fff;}
.chart-wrap{background:#fff;border-radius:14px;padding:16px 14px;border:0.5px solid var(--border);}
.bars{display:flex;align-items:flex-end;gap:5px;height:110px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;}
.bar-body{width:100%;border-radius:4px 4px 0 0;transition:height 0.4s ease-out;min-height:2px;}
.bar-body.current{background:var(--red);}.bar-body.prev{background:var(--blue);opacity:0.55;}
.bar-body.selected{outline:2px solid var(--red);outline-offset:1px;}
.bar-month{font-size:9px;color:var(--text3);font-weight:600;}.bar-month.now{color:var(--red);font-weight:900;}.bar-month.sel{color:var(--red);font-weight:900;}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:12px;padding-top:10px;border-top:0.5px solid var(--border);}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
.legend-text{font-size:10px;color:var(--text2);font-weight:500;}
.toggle-btn{font-size:10px;padding:5px 9px;border-radius:6px;font-weight:700;color:var(--text2);cursor:pointer;border:none;background:transparent;transition:all 0.2s;}
.chart-hint{font-size:10px;color:var(--text3);text-align:center;margin-top:8px;font-weight:500;}
.breakdown-list{display:flex;flex-direction:column;gap:8px;}
.breakdown-item{background:#fff;border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;border:0.5px solid var(--border);}
.breakdown-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.breakdown-icon.red{background:var(--red-light);}.breakdown-icon.blue{background:var(--blue-light);}.breakdown-icon.gray{background:#f0f0f0;}
.breakdown-icon.yt{background:var(--red-light);}
.breakdown-icon i{font-size:20px;}
.breakdown-icon.red i{color:var(--red);}.breakdown-icon.blue i{color:var(--blue);}.breakdown-icon.gray i{color:var(--text3);}.breakdown-icon.yt i{color:var(--red);}
.breakdown-info{flex:1;min-width:0;}
.breakdown-name{font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:500;}
.breakdown-val{font-size:16px;font-weight:900;color:var(--text);}
.breakdown-ratio{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.breakdown-ratio.has{background:var(--red-light);color:var(--red);}.breakdown-ratio.none{background:#f0f0f0;color:var(--text3);}
.summary-box{background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);border-radius:18px;padding:20px;margin:0 14px;box-shadow:0 4px 16px rgba(219,68,76,0.25);}
.summary-label{color:rgba(255,255,255,0.85);font-size:11px;font-weight:500;margin-bottom:6px;}
.summary-value{color:#fff;font-size:30px;font-weight:900;letter-spacing:-0.02em;}
.summary-sub{color:rgba(255,255,255,0.8);font-size:11px;margin-top:6px;font-weight:500;}
.summary-row{display:flex;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.2);}
.summary-col{text-align:center;flex:1;}
.summary-col-label{color:rgba(255,255,255,0.75);font-size:10px;margin-bottom:5px;font-weight:500;}
.summary-col-val{color:#fff;font-size:14px;font-weight:900;}
.trend-table{background:#fff;border-radius:14px;overflow:hidden;border:0.5px solid var(--border);}
.trend-row{display:flex;align-items:center;padding:12px 14px;border-bottom:0.5px solid var(--border);}
.trend-row:last-child{border-bottom:none;}
.trend-row.header{background:#f9f9f9;}
.trend-month{font-size:12px;font-weight:900;color:var(--text);width:40px;flex-shrink:0;}
.trend-sales,.trend-expense{flex:1;font-size:11px;color:var(--text);text-align:right;font-weight:500;}
.trend-profit{flex:1;font-size:11px;font-weight:900;text-align:right;}
.trend-profit.pos{color:var(--red);}.trend-profit.neg{color:var(--blue);}
.header-col{color:var(--text2);font-weight:600;font-size:10px;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:0.5px solid var(--border);display:flex;padding:8px 0 calc(8px + var(--safe-bottom));z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;padding:6px 0;}
.nav-item i{font-size:22px;color:var(--text3);}.nav-item.active i{color:var(--red);}
.nav-label{font-size:9px;color:var(--text3);font-weight:700;}.nav-item.active .nav-label{color:var(--red);}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.loading-spinner{width:38px;height:38px;border:3px solid var(--red-light);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;}
.loading-text{font-size:13px;color:var(--text2);font-weight:600;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:calc(90px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:24px;font-size:12px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.toast.show{opacity:1;}
.toast.success{background:#2e7d32;}
.update-time{font-size:10px;color:var(--text3);text-align:center;margin-top:8px;padding-bottom:4px;}
.input-label{font-size:12px;color:var(--text2);font-weight:700;margin-bottom:9px;}
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.month-btn{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:13px 0;text-align:center;font-size:14px;font-weight:700;color:var(--text2);cursor:pointer;transition:all 0.15s;}
.month-btn.active{background:var(--red);color:#fff;border-color:var(--red);}
.input-card{background:#fff;border-radius:14px;padding:16px;border:0.5px solid var(--border);margin-bottom:12px;}
.input-card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.input-card-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.input-card-icon.salon{background:#f0f0f0;}.input-card-icon.salon i{color:var(--text2);font-size:20px;}
.input-card-icon.yt{background:var(--red-light);}.input-card-icon.yt i{color:var(--red);font-size:20px;}
.input-card-name{font-size:14px;font-weight:700;}
.input-card-now{font-size:11px;color:var(--text3);margin-top:1px;}
.input-wrap{display:flex;align-items:center;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;}
.input-wrap .yen{font-size:22px;color:var(--red);font-weight:700;margin-right:6px;}
.input-wrap input{flex:1;border:none;background:transparent;font-size:24px;font-weight:700;color:var(--text);outline:none;font-family:'Noto Sans JP',sans-serif;width:100%;}
.input-wrap input::placeholder{color:var(--text3);font-weight:400;}
.save-btn{width:100%;background:var(--blue);border:none;border-radius:12px;padding:16px;color:#fff;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Noto Sans JP',sans-serif;transition:opacity 0.15s;}
.save-btn:active{opacity:0.85;}
.save-btn i{font-size:19px;}
.save-btn:disabled{background:var(--text3);}
.breakdown-item.tappable{cursor:pointer;transition:background 0.15s;}
.breakdown-item.tappable:active{background:#fafafa;}
.tap-chevron{color:var(--text3);font-size:18px;margin-left:2px;flex-shrink:0;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:flex-end;justify-content:center;z-index:500;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px 18px calc(24px + var(--safe-bottom));max-height:78vh;overflow-y:auto;animation:slideUp 0.25s ease-out;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-title{font-size:15px;font-weight:900;color:var(--text);}
.modal-close{background:#f0f0f0;border:none;width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-total{background:var(--blue-light);border-radius:12px;padding:13px 15px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal-total-label{font-size:12px;color:var(--blue);font-weight:700;}
.modal-total-val{font-size:19px;color:var(--blue);font-weight:900;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:13px 4px;border-bottom:0.5px solid var(--border);}
.detail-row:last-child{border-bottom:none;}
.detail-name{font-size:14px;font-weight:700;color:var(--text);}
.detail-date{font-size:11px;color:var(--text3);margin-top:2px;}
.detail-amount{font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;}
.detail-empty{text-align:center;color:var(--text3);font-size:13px;padding:34px 0;}
</style>
</head>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbyDepduBJ5qNk4Ay9amEW1aq2dx1JdNC91ZeSZJojLtYE0FyAMSBDhFrY8-vHf2zjax/exec';

const REAL_YEAR=new Date().getFullYear();
const REAL_MONTH=new Date().getMonth()+1;

let viewYear=REAL_YEAR;
let viewMonth=REAL_MONTH;
let selectedMonth=REAL_MONTH;
let chartMode='current';
let salesData={},expensesData={},profitsData={};
let boxingData={},personalData={},salonData={},youtubeData={};
let prevSalesData={},prevExpensesData={};

function fmt(n){
  if(n===null||n===undefined||isNaN(n))return'¥0';
  return'¥'+Math.round(n).toLocaleString('ja-JP');
}
function fmtNow(n){
  if(n===null||n===undefined||isNaN(n)||n===0)return'—';
  return'¥'+Math.round(n).toLocaleString('ja-JP');
}

function showToast(msg,ok){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(ok?' success':'');
  setTimeout(()=>el.classList.remove('show'),2200);
}

function setLoadingText(t){
  const el=document.querySelector('#loading .loading-text');
  if(el)el.textContent=t;
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  window.scrollTo(0,0);
}

function changeMonth(d){
  let ny=viewYear;
  let nm=viewMonth+d;
  if(nm<1){nm=12;ny--;}
  if(nm>12){nm=1;ny++;}
  if(ny<2024)return;
  if(ny>REAL_YEAR)return;
  if(ny===REAL_YEAR&&nm>REAL_MONTH)return;
  const yearChanged=(ny!==viewYear);
  viewYear=ny;viewMonth=nm;
  updatePeriodLabel();
  if(yearChanged){loadData();}
  else{renderAll();}
}

function goToCurrentMonth(){
  const yearChanged=(REAL_YEAR!==viewYear);
  viewYear=REAL_YEAR;viewMonth=REAL_MONTH;
  updatePeriodLabel();
  if(yearChanged){loadData();}
  else{renderAll();}
}

function updatePeriodLabel(){
  document.getElementById('ym-year').textContent=viewYear+'年';
  document.getElementById('ym-month').textContent=viewMonth+'月';
}

async function fetchJSON(url){
  const res=await fetch(url,{method:'GET',mode:'cors',cache:'no-store',redirect:'follow'});
  return await res.json();
}

async function loadData(doRecalc){
  document.getElementById('loading').style.display='flex';
  if(doRecalc){
    const rb=document.getElementById('refresh-btn');
    if(rb)rb.classList.add('spinning');
    // ① 先にスプレッドシート側の全件集計を走らせる（ボクシング月会費・パーソナル・人件費）
    setLoadingText('最新データを集計中...（10〜30秒）');
    try{
      await fetchJSON(GAS_URL+'?action=updateAll&t='+Date.now());
    }catch(e){console.error('全件集計に失敗',e);}
    setLoadingText('集計結果を読み込み中...');
  }else{
    setLoadingText('データを取得中...');
  }
  try{
    const t=Date.now();
    const [j1,j2,j3]=await Promise.all([
      fetchJSON(GAS_URL+'?action=getMonthlyDashboardData&year='+viewYear+'&t='+t),
      fetchJSON(GAS_URL+'?action=getMonthlyDashboardData&year='+(viewYear-1)+'&t='+t),
      fetchJSON(GAS_URL+'?action=getManualSalesData&year='+viewYear+'&t='+t)
    ]);
    if(j1&&j1.success){
      salesData=j1.sales||{};
      expensesData=j1.expenses||{};
      profitsData=j1.profits||{};
      boxingData=j1.boxing||{};
      personalData=j1.personal||{};
      salonData=j1.salon||{};
    }else{
      salesData={};expensesData={};profitsData={};
      boxingData={};personalData={};salonData={};
    }
    if(j2&&j2.success){
      prevSalesData=j2.sales||{};
      prevExpensesData=j2.expenses||{};
    }else{
      prevSalesData={};prevExpensesData={};
    }
    if(j3&&j3.success){
      salonData=j3.salon||salonData;
      youtubeData=j3.youtube||{};
    }else{
      youtubeData={};
    }
    renderAll();
    if(doRecalc)showToast('最新データに更新しました',true);
  }catch(e){
    showToast('データ取得に失敗しました');
    console.error(e);
  }finally{
    document.getElementById('loading').style.display='none';
    const rb=document.getElementById('refresh-btn');
    if(rb)rb.classList.remove('spinning');
  }
}

function renderAll(){
  updatePeriodLabel();
  renderKPI();renderChart();renderBreakdown();renderExpense();renderTrend();renderUpdateTime();
  renderMonths();fillInputs();
}

function renderUpdateTime(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('update-time').textContent='最終更新：'+(now.getMonth()+1)+'/'+now.getDate()+' '+hh+':'+mm;
}

function renderKPI(){
  document.getElementById('kpi-sales-label').textContent=viewMonth+'月の売上';
  document.getElementById('kpi-exp-label').textContent=viewMonth+'月の経費';
  document.getElementById('kpi-prof-label').textContent=viewMonth+'月の損益';

  const ms=salesData[viewMonth]||0;
  const pms=salesData[viewMonth-1]||0;
  const me=expensesData[viewMonth]||0;
  const pme=expensesData[viewMonth-1]||0;
  const mp=profitsData[viewMonth]||(ms-me);
  const pr=ms>0?Math.round(mp/ms*100):0;
  let ys=0,pys=0;
  for(let m=1;m<=12;m++){ys+=salesData[m]||0;pys+=prevSalesData[m]||0;}

  document.getElementById('kpi-month-sales').textContent=fmt(ms);
  document.getElementById('kpi-year-sales').textContent=fmt(ys);
  document.getElementById('kpi-month-expense').textContent=fmt(me);
  document.getElementById('kpi-month-profit').textContent=fmt(mp);

  const md=pms>0?Math.round((ms-pms)/pms*100):null;
  const mel=document.getElementById('kpi-month-diff');
  if(md!==null){mel.textContent=(md>=0?'▲':'▼')+' 前月比 '+(md>=0?'+':'')+md+'%';mel.className='kpi-diff '+(md>=0?'up':'down');}
  else{mel.textContent='前月データなし';mel.className='kpi-diff neutral';}

  const yd=pys>0?Math.round((ys-pys)/pys*100):null;
  const yel=document.getElementById('kpi-year-diff');
  if(yd!==null){yel.textContent=(yd>=0?'▲':'▼')+' 前年比 '+(yd>=0?'+':'')+yd+'%';yel.className='kpi-diff '+(yd>=0?'up':'down');}
  else{yel.textContent='前年データなし';yel.className='kpi-diff neutral';}

  const ed=pme>0?Math.round((me-pme)/pme*100):null;
  const eel=document.getElementById('kpi-expense-diff');
  if(ed!==null){eel.textContent=(ed>=0?'▲':'▼')+' 前月比 '+(ed>=0?'+':'')+ed+'%';eel.className='kpi-diff '+(ed>=0?'down':'up');}
  else{eel.textContent='—';eel.className='kpi-diff neutral';}

  const prEl=document.getElementById('kpi-profit-rate');
  prEl.textContent='利益率 '+pr+'%';
  prEl.className='kpi-diff '+(mp>=0?'up':'down');
}

function renderChart(){
  const MAX_H=100;
  let html='';

  if(chartMode==='stack'){
    const segs=[
      {data:boxingData,color:'#DB444C',label:'ボクシング'},
      {data:personalData,color:'#5BB9CD',label:'パーソナル'},
      {data:salonData,color:'#FBC02D',label:'サロン'},
      {data:youtubeData,color:'#B39DDB',label:'YouTube'}
    ];
    let maxV=1;
    for(let m=1;m<=12;m++){
      const sum=(boxingData[m]||0)+(personalData[m]||0)+(salonData[m]||0)+(youtubeData[m]||0);
      if(sum>maxV)maxV=sum;
    }
    for(let m=1;m<=12;m++){
      const isReal=m===REAL_MONTH&&viewYear===REAL_YEAR;
      const isSel=m===viewMonth;
      html+='<div class="bar-col" onclick="selectBarMonth('+m+')">';
      html+='<div style="display:flex;flex-direction:column-reverse;align-items:stretch;height:'+MAX_H+'px;width:100%;border-radius:4px 4px 0 0;overflow:hidden;'+(isSel?'outline:2px solid var(--red);outline-offset:2px;':'')+'">';
      segs.forEach(s=>{
        const v=s.data[m]||0;
        const h=Math.round((v/maxV)*MAX_H);
        if(h>0)html+='<div style="height:'+h+'px;width:100%;background:'+s.color+';"></div>';
      });
      html+='</div>';
      html+='<div class="bar-month'+(isSel?' sel':(isReal?' now':''))+'">'+m+'</div></div>';
    }
    document.getElementById('chart-bars').innerHTML=html;
    document.getElementById('chart-legend').innerHTML=segs.map(s=>
      '<span><span class="legend-dot" style="background:'+s.color+'"></span><span class="legend-text">'+s.label+'</span></span>'
    ).join('');
    return;
  }

  const vals=Object.values(salesData);
  const pvals=Object.values(prevSalesData);
  const maxV=Math.max(...vals,...(chartMode==='compare'?pvals:[]),1);
  for(let m=1;m<=12;m++){
    const v=salesData[m]||0;
    const h=Math.round((v/maxV)*MAX_H);
    const isReal=m===REAL_MONTH&&viewYear===REAL_YEAR;
    const isSel=m===viewMonth;
    html+='<div class="bar-col" onclick="selectBarMonth('+m+')">';
    if(chartMode==='compare'){
      const pv=prevSalesData[m]||0;
      const ph=Math.round((pv/maxV)*MAX_H);
      html+='<div style="display:flex;align-items:flex-end;gap:2px;height:'+MAX_H+'px;width:100%;'+(isSel?'outline:2px solid var(--red);outline-offset:2px;border-radius:4px;':'')+'">';
      html+='<div class="bar-body current" style="height:'+h+'px;flex:1"></div>';
      html+='<div class="bar-body prev" style="height:'+ph+'px;flex:1"></div>';
      html+='</div>';
    }else{
      html+='<div style="display:flex;align-items:flex-end;height:'+MAX_H+'px;width:100%;">';
      html+='<div class="bar-body current'+(isSel?' selected':'')+'" style="height:'+h+'px;width:100%;"></div>';
      html+='</div>';
    }
    html+='<div class="bar-month'+(isSel?' sel':(isReal?' now':''))+'">'+m+'</div></div>';
  }
  document.getElementById('chart-bars').innerHTML=html;
  const leg=document.getElementById('chart-legend');
  leg.innerHTML='<span><span class="legend-dot" style="background:var(--red)"></span><span class="legend-text">'+viewYear+'年</span></span>'+
    (chartMode==='compare'?'<span><span class="legend-dot" style="background:var(--blue);opacity:0.55"></span><span class="legend-text">'+(viewYear-1)+'年</span></span>':'');
}

function selectBarMonth(m){
  viewMonth=m;
  renderAll();
}

function openDetailModal(){
  document.getElementById('detail-modal').classList.add('show');
}
function closeDetailModal(e){
  if(e&&e.target&&e.target!==document.getElementById('detail-modal'))return;
  document.getElementById('detail-modal').classList.remove('show');
}
async function showPersonalDetail(){
  const title=document.getElementById('detail-modal-title');
  const totalEl=document.getElementById('detail-modal-total');
  const listEl=document.getElementById('detail-modal-list');
  title.textContent=viewMonth+'月のパーソナル内訳';
  totalEl.textContent='—';
  listEl.innerHTML='<div class="detail-empty">読み込み中...</div>';
  openDetailModal();
  try{
    const j=await fetchJSON(GAS_URL+'?action=getPersonalDetail&year='+viewYear+'&month='+viewMonth+'&t='+Date.now());
    if(j&&j.success){
      const its=j.items||[];
      if(its.length===0){
        listEl.innerHTML='<div class="detail-empty">この月のパーソナル申込はありません</div>';
        totalEl.textContent='¥0';
        return;
      }
      let total=0,html='';
      its.forEach(it=>{
        total+=Number(it.amount)||0;
        html+='<div class="detail-row"><div><div class="detail-name">'+(it.name||'（名前なし）')+'</div><div class="detail-date">'+(it.date||'')+'</div></div><div class="detail-amount">'+fmt(it.amount)+'</div></div>';
      });
      totalEl.textContent=fmt(total);
      listEl.innerHTML=html;
    }else{
      listEl.innerHTML='<div class="detail-empty">取得に失敗しました</div>';
      totalEl.textContent='¥0';
    }
  }catch(e){
    listEl.innerHTML='<div class="detail-empty">取得に失敗しました</div>';
    totalEl.textContent='¥0';
    console.error(e);
  }
}

function switchChart(mode,btn){
  chartMode=mode;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}

function renderBreakdown(){
  document.getElementById('breakdown-title').textContent='売上内訳（'+viewMonth+'月）';
  const ms=salesData[viewMonth]||0;
  const b=boxingData[viewMonth]||0;
  const p=personalData[viewMonth]||0;
  const s=salonData[viewMonth]||0;
  const y=youtubeData[viewMonth]||0;
  const items=[
    {name:'ボクシング月会費',icon:'ti-trophy',cls:'red',val:b},
    {name:'パーソナル都度',icon:'ti-run',cls:'blue',val:p,tap:'personal'},
    {name:'オンラインサロン',icon:'ti-world',cls:'gray',val:s},
    {name:'YouTube収益',icon:'ti-brand-youtube',cls:'yt',val:y},
  ];
  document.getElementById('breakdown-list').innerHTML=items.map(it=>{
    const ratio=ms>0?Math.round(it.val/ms*100):0;
    const tapCls=it.tap==='personal'?' tappable':'';
    const tapAttr=it.tap==='personal'?'onclick="showPersonalDetail()"':'';
    const chevron=it.tap==='personal'?'<i class="ti ti-chevron-right tap-chevron"></i>':'';
    return `
    <div class="breakdown-item${tapCls}" ${tapAttr}>
      <div class="breakdown-icon ${it.cls}"><i class="ti ${it.icon}"></i></div>
      <div class="breakdown-info">
        <div class="breakdown-name">${it.name}</div>
        <div class="breakdown-val">${fmt(it.val)}</div>
      </div>
      <div class="breakdown-ratio ${it.val>0?'has':'none'}">${it.val>0?ratio+'%':'—'}</div>
      ${chevron}
    </div>`;
  }).join('');
}

function renderExpense(){
  document.getElementById('expense-sub').textContent=viewYear+'年';
  document.getElementById('exp-month-label').textContent=viewMonth+'月の経費';
  const me=expensesData[viewMonth]||0;
  let ye=0;
  for(let m=1;m<=12;m++)ye+=expensesData[m]||0;
  document.getElementById('exp-month').textContent=fmt(me);
  document.getElementById('exp-year').textContent=fmt(ye);

  let html='';
  for(let m=1;m<=12;m++){
    const e=expensesData[m]||0;
    const pe=expensesData[m-1]||0;
    const diff=pe>0?Math.round((e-pe)/pe*100):null;
    const isSel=m===viewMonth;
    let diffHtml='—';let diffCls='';
    if(e>0&&diff!==null){
      diffHtml=(diff>=0?'▲ +':'▼ ')+diff+'%';
      diffCls=diff>=0?'neg':'pos';
    }
    html+=`<div class="trend-row" style="${isSel?'background:#fdf5f5;':''}">
      <div class="trend-month" style="${isSel?'color:var(--red);':''}">${m}月</div>
      <div class="trend-sales">${e>0?fmt(e):'—'}</div>
      <div class="trend-profit ${diffCls}">${diffHtml}</div>
    </div>`;
  }
  document.getElementById('exp-rows').innerHTML=html;
}

function renderTrend(){
  let ts=0,te=0;
  for(let m=1;m<=12;m++){ts+=salesData[m]||0;te+=expensesData[m]||0;}
  const tp=ts-te;
  const pr=ts>0?Math.round(tp/ts*100):0;
  document.getElementById('trend-sub').textContent=viewYear+'年';
  document.getElementById('summary-profit').textContent=fmt(tp);
  document.getElementById('summary-sub').textContent='利益率 '+pr+'%';
  document.getElementById('summary-sales').textContent=fmt(ts);
  document.getElementById('summary-expense').textContent=fmt(te);
  document.getElementById('summary-rate').textContent=pr+'%';

  let html='';
  for(let m=1;m<=12;m++){
    const s=salesData[m]||0;
    const e=expensesData[m]||0;
    const p=profitsData[m]||(s-e);
    const isSel=m===viewMonth;
    html+=`<div class="trend-row" style="${isSel?'background:#fdf5f5;':''}">
      <div class="trend-month" style="${isSel?'color:var(--red);':''}">${m}月</div>
      <div class="trend-sales">${s>0?fmt(s):'—'}</div>
      <div class="trend-expense">${e>0?fmt(e):'—'}</div>
      <div class="trend-profit ${p>0?'pos':p<0?'neg':''}">${s>0||e>0?fmt(p):'—'}</div>
    </div>`;
  }
  document.getElementById('trend-rows').innerHTML=html;
}

function renderMonths(){
  let html='';
  for(let m=1;m<=12;m++){
    html+='<button class="month-btn'+(m===selectedMonth?' active':'')+'" onclick="selectMonth('+m+')">'+m+'月</button>';
  }
  document.getElementById('month-grid').innerHTML=html;
}

function selectMonth(m){
  selectedMonth=m;
  renderMonths();
  fillInputs();
}

function fillInputs(){
  const s=salonData[selectedMonth]||0;
  const y=youtubeData[selectedMonth]||0;
  document.getElementById('salon-input').value=s>0?s:'';
  document.getElementById('yt-input').value=y>0?y:'';
  document.getElementById('salon-now').textContent='現在：'+fmtNow(s);
  document.getElementById('yt-now').textContent='現在：'+fmtNow(y);
}

async function saveManual(){
  const salonVal=document.getElementById('salon-input').value;
  const ytVal=document.getElementById('yt-input').value;
  const btn=document.getElementById('save-btn');
  const lbl=document.getElementById('save-label');
  btn.disabled=true;lbl.textContent='保存中...';
  try{
    const url=GAS_URL+'?action=addManualSales'+
      '&year='+viewYear+
      '&month='+selectedMonth+
      '&salon='+encodeURIComponent(salonVal===''?'':salonVal)+
      '&youtube='+encodeURIComponent(ytVal===''?'':ytVal)+
      '&t='+Date.now();
    const j=await fetchJSON(url);
    if(j&&j.success){
      salonData[selectedMonth]=Number(salonVal)||0;
      youtubeData[selectedMonth]=Number(ytVal)||0;
      fillInputs();
      showToast('✓ '+selectedMonth+'月を保存しました',true);
      loadData();
    }else{
      showToast('保存に失敗：'+(j.message||'不明'));
    }
  }catch(e){
    showToast('保存に失敗しました');
    console.error(e);
  }finally{
    btn.disabled=false;lbl.textContent='この内容で保存';
  }
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));
}
if('caches' in window){
  caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
}
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});

updatePeriodLabel();
loadData();
</script>
</body>
</html>
